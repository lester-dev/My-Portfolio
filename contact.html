<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="shortcut icon" href="Cool-Logo-PNG-Isolated-HD.png" type="image/x-icon">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body>

    <header>
        <a href="#" class="logo">lester.dev</a>
               <nav class="topnav" id="myTopnav">
                   <a href="index.html">Home</a>
                   <a href="about.html">About</a>
                   <a href="skill.html">Skills</a>
                   <a href="#" class="active">Contact</a>
                   <a href="javascript:void(0);" class="icon" onclick="myFunction()">
                    <i class="fa fa-bars"></i>
                   </a>
               </nav>   
    </header>

    <div class="screen-body">

        <div class="screen-body-item left">
            <div class="app-title">
                <span>Let's</span>
                <span>Connect.</span>
            </div>
        </div>
        
        <div class="screen-body-item">
            <form action="" class="app-form">
                <div class="app-form-group">
                    <input type="text" class="app-form-control" placeholder="NAME" required>
                </div>
                <div class="app-form-group">
                    <input type="email" class="app-form-control" placeholder="EMAIL" required>
                </div>
                <div class="app-form-group message">
                    <input class="app-form-control" placeholder="MESSAGE">
                </div>
                <div class="app-form-group buttons">
                    <input type="button" class="app-form-button" value="SUBMIT">
                </div>               
            </form>
        </div>
    </div>

    <footer>
        <div class="icon">
            <a href="https://www.facebook.com/"> <i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.instagram.com/"> <i class="fa-brands fa-square-instagram"></i></a>
            <a href="https://github.com/"> <i class="fa-brands fa-github"></i></a>
            <a href="https://www.linkedin.com/"> <i class="fa-brands fa-linkedin"></i></a>
        </div>
    </footer>

    <script>
        function myFunction() {
            var x = document.getElementById("myTopnav");
            if (x.className === "topnav") {
                x.className += " responsive";
            } else {
                x.className = "topnav";
            }
        }
    </script>

</body>
</html>
